<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EC Site PoC</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f5f7fa; color: #1a1a2e; }

      /* Nav */
      nav { background: #1a1a2e; padding: 0 24px; display: flex; align-items: center; gap: 8px; height: 56px; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
      .nav-brand { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: .5px; margin-right: 16px; white-space: nowrap; }
      .nav-brand span { color: #4a9eff; }
      nav button { background: none; border: none; color: #aab4c8; cursor: pointer; font-size: 14px; padding: 6px 14px; border-radius: 6px; transition: all .15s; position: relative; }
      nav button:hover { color: #fff; background: rgba(255,255,255,.08); }
      nav button.active { color: #fff; background: rgba(74,158,255,.15); }
      .badge { background: #e74c3c; color: #fff; font-size: 10px; font-weight: 700; border-radius: 10px; padding: 1px 6px; margin-left: 5px; }

      /* Layout */
      main { padding: 32px 24px; max-width: 1100px; margin: 0 auto; }
      h2 { font-size: 20px; font-weight: 700; color: #1a1a2e; margin: 0 0 16px; }
      h3 { font-size: 16px; font-weight: 600; margin: 24px 0 12px; }

      /* Buttons */
      button.primary { background: #4a9eff; color: white; border: none; border-radius: 8px; padding: 10px 24px; cursor: pointer; font-size: 15px; font-weight: 600; transition: background .15s; }
      button.primary:hover { background: #2b87f0; }
      button.primary:disabled { background: #9ac4f8; cursor: not-allowed; }
      button.small { background: #fff; border: 1px solid #d0d7e2; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 12px; color: #444; transition: all .15s; }
      button.small:hover { background: #f0f4ff; border-color: #4a9eff; color: #4a9eff; }
      button.small.danger { border-color: #f5a0a0; color: #c0392b; }
      button.small.danger:hover { background: #fff0f0; border-color: #e74c3c; }

      /* Product cards */
      .cards { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 4px; }
      .card { border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px; width: 220px; background: white; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: box-shadow .15s, transform .15s; }
      .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); transform: translateY(-2px); }
      .card-category { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
      .cat-electronics { background: #e8f4fd; color: #1a6fa8; }
      .cat-accessories { background: #fef3e2; color: #9a5f00; }
      .cat-default { background: #f0f0f0; color: #555; }
      .card-name { font-size: 15px; font-weight: 700; margin: 0 0 6px; line-height: 1.3; }
      .card-desc { font-size: 12px; color: #718096; margin: 0 0 10px; line-height: 1.4; min-height: 32px; }
      .card-price { font-size: 20px; font-weight: 800; color: #e74c3c; margin: 0 0 4px; }
      .card-stock { font-size: 11px; color: #a0aec0; margin: 0 0 12px; }
      .in-cart { font-size: 11px; color: #27ae60; font-weight: 600; margin-bottom: 8px; }

      /* Cart */
      .cart-box { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-top: 8px; }
      .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
      .cart-item:last-of-type { border-bottom: none; }
      .cart-item-name { font-size: 14px; font-weight: 500; }
      .cart-item-right { display: flex; align-items: center; gap: 12px; }
      .cart-item-price { font-size: 14px; color: #e74c3c; font-weight: 600; }
      .cart-total { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 2px solid #e2e8f0; }
      .cart-total-label { font-size: 16px; font-weight: 700; }
      .cart-total-price { font-size: 24px; font-weight: 800; color: #e74c3c; }

      /* Tables */
      table { border-collapse: collapse; width: 100%; font-size: 13px; margin-top: 12px; }
      th, td { border: 1px solid #e2e8f0; padding: 8px 14px; text-align: left; }
      th { background: #f7fafc; font-weight: 600; color: #4a5568; }
      tr:hover td { background: #f9fbff; }

      /* Status */
      .status-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 16px; font-weight: 700; padding: 8px 18px; border-radius: 24px; }
      .status-ok { background: #e6f9ee; color: #1e7e34; }
      .status-err { background: #fde8e8; color: #9b2335; }

      /* Misc */
      select { padding: 8px 12px; font-size: 14px; border: 1px solid #d0d7e2; border-radius: 8px; outline: none; background: white; }
      select:focus { border-color: #4a9eff; }
      .msg { margin-top: 16px; padding: 12px 16px; border-radius: 8px; background: #e6f9ee; color: #1e5c31; font-weight: 500; }
      .err { background: #fde8e8; color: #8c1a1a; }
      .muted { color: #a0aec0; font-size: 14px; }
      .loading { color: #a0aec0; font-style: italic; }
      section + section { margin-top: 40px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
